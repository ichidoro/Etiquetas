<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta name="description" content="AquaOps — Sistema de gestión, diseño e impresión de etiquetas con códigos de barras EAN-13 y DUN-14. Trazabilidad completa, diseñador visual y soporte multi-impresora Zebra." />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/png" href="/aquaops-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>AquaOps — Etiquetas y Trazabilidad</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registrado con éxito:', reg.scope))
            .catch(err => console.error('Error al registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
